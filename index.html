<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OptionPilot</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">

</head>

<body class="focus">

<div class="noise"></div>

<header class="topbar">

    <div class="brand">

        <span class="brand-dot"></span>

        <h2>OPTIONPILOT</h2>

    </div>

    <nav>

        <a href="#">Docs</a>

        <a href="#">GitHub</a>

    </nav>

</header>


<section class="hero">

    <div class="hero-content">

        <div class="eyebrow">

            AI Powered Trading Workspace

        </div>

        <h1>

            See the market.

            <span>Not the noise.</span>

        </h1>

        <p>

            A calm trading workspace built for focus,
            learning and disciplined decision making.

        </p>

        <div class="buttons">

            <button class="primary">

                Enter Workspace

            </button>

            <button class="secondary">

                Learn More

            </button>

        </div>

        <div class="mode-selector">

            <button class="mode active">

                Focus

            </button>

            <button class="mode">

                Chill

            </button>

            <button class="mode">

                Learn

            </button>

        </div>

    </div>

</section>


<footer>

    <span>

        Version 0.1 • Built with ❤️ using Upstox API

    </span>

</footer>

<script src="js/app.js"></script>

</body>

</html>
