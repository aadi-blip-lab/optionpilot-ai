<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptionPilot AI</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="background-grid"></div>

<div class="container">

    <aside class="sidebar">

        <div class="logo">
            <h1>⚡ OPTIONPILOT</h1>
            <span>AI TRADING PLATFORM</span>
        </div>

        <nav>

            <a class="active">Dashboard</a>

            <a>Market</a>

            <a>Signals</a>

            <a>Paper Trading</a>

            <a>History</a>

            <a>Settings</a>

        </nav>

    </aside>

    <main>

        <header>

            <h2>Dashboard</h2>

            <div class="status">
                ● Connected
            </div>

        </header>

        <section class="cards">

            <div class="card">
                <h3>NIFTY</h3>
                <h1>Loading...</h1>
            </div>

            <div class="card">
                <h3>SENSEX</h3>
                <h1>Loading...</h1>
            </div>

            <div class="card">
                <h3>AI Confidence</h3>
                <h1>--%</h1>
            </div>

            <div class="card">
                <h3>Status</h3>
                <h1>Waiting</h1>
            </div>

        </section>

        <section class="hero">

            <h1>OPTIONPILOT AI</h1>

            <p>
                AI Powered NIFTY & SENSEX Options Trading Platform
            </p>

            <button>
                Launch Market Engine
            </button>

        </section>

    </main>

</div>

<script src="js/app.js"></script>

</body>
</html>
